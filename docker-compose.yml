services:
  postgres:
    image: postgres:16-alpine
    container_name: cryptoalarm-db
    environment:
      POSTGRES_DB: cryptoalarm
      POSTGRES_USER: cryptoalarm
      POSTGRES_PASSWORD: cryptoalarm
    ports:
      - "5432:5432"
    volumes:
      - cryptoalarm-pgdata:/var/lib/postgresql/data

volumes:
  cryptoalarm-pgdata:
