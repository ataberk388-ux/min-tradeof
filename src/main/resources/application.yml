spring:
  application:
    name: cryptoalarm
  datasource:
    # Uretimde POSTGRES_* / DATABASE_URL ENV degiskenlerinden gelir; burada dev varsayilani.
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/cryptoalarm}
    username: ${POSTGRES_USER:cryptoalarm}
    password: ${POSTGRES_PASSWORD:cryptoalarm}
  jpa:
    hibernate:
      # Sema artik Flyway tarafindan yonetilir; Hibernate yalniz dogrular (drift yakalar).
      ddl-auto: validate
    open-in-view: false
  flyway:
    # Mevcut (ddl-auto ile olusmus) DB'ler V1'i atlayip baseline'lanir; bos DB'de V1 calisir.
    baseline-on-migrate: true

# JWT ayarlari. secret HS256 icin >= 256 bit (>= 32 karakter) olmali.
# Uretimde ENV degiskeninden gelmeli; burada dev varsayilani.
security:
  jwt:
    secret: ${JWT_SECRET:cryptoalarm-dev-secret-key-change-me-please-32+chars}
    # 7 gun: uzun oturumda token suresinin dolup SSE'lerin 401 vermesini onler
    expiry-minutes: 10080

# Dis borsa baglanti ayarlari
# Port 9443 bazi aglarda/firewall'larda kapali; 443 her zaman acik (REST gibi).
# symbols yalnizca BASLANGIC tohumu; alarm kurulan yeni sembollere runtime'da otomatik abone olunur.
exchange:
  ws-url: wss://stream.binance.com:443/ws
  symbols:
    - BTCUSDT
    - ETHUSDT
    - BNBUSDT
    - SOLUSDT
    - XRPUSDT
    - ADAUSDT
    - DOGEUSDT
    - AVAXUSDT
    - LINKUSDT
    - DOTUSDT
    - TRXUSDT
    - MATICUSDT
    - LTCUSDT
    - NEARUSDT
    - APTUSDT

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  metrics:
    tags:
      application: cryptoalarm
