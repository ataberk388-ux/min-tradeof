spring:
  application:
    name: cryptoalarm
  datasource:
    url: jdbc:postgresql://localhost:5432/cryptoalarm
    username: cryptoalarm
    password: cryptoalarm
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

# JWT ayarlari. secret HS256 icin >= 256 bit (>= 32 karakter) olmali.
# Uretimde ENV degiskeninden gelmeli; burada dev varsayilani.
security:
  jwt:
    secret: ${JWT_SECRET:cryptoalarm-dev-secret-key-change-me-please-32+chars}
    # 7 gun: uzun oturumda token suresinin dolup SSE'lerin 401 vermesini onler
    expiry-minutes: 10080

# Dis borsa baglanti ayarlari
# Port 9443 bazi aglarda/firewall'larda kapali; 443 her zaman acik (REST gibi).
# symbols yalnizca BASLANGIC tohumu; alarm kurulan yeni sembollere runtime'da otomatik abone olunur.
exchange:
  ws-url: wss://stream.binance.com:443/ws
  symbols:
    - BTCUSDT
    - ETHUSDT
    - BNBUSDT
    - SOLUSDT
    - XRPUSDT
    - ADAUSDT
    - DOGEUSDT
    - AVAXUSDT
    - LINKUSDT
    - DOTUSDT
    - TRXUSDT
    - MATICUSDT
    - LTCUSDT
    - NEARUSDT
    - APTUSDT

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
